name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set server IP
        run: find . -name "ConnectionsManager.cpp" -exec sed -i 's/YOUR_SERVER_IP/94.156.102.224/g' {} \;
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;21.4.7075529" "build-tools;30.0.3" "build-tools;35.0.0"
      - name: Fix dx tool
        run: |
          cp $ANDROID_HOME/build-tools/30.0.3/dx $ANDROID_HOME/build-tools/35.0.0/dx
          cp $ANDROID_HOME/build-tools/30.0.3/lib/dx.jar $ANDROID_HOME/build-tools/35.0.0/lib/dx.jar
      - name: Generate keystore
        run: |
          mkdir -p TMessagesProj/config
          keytool -genkeypair -v -keystore TMessagesProj/config/testgram-release.jks -alias testgram -keyalg RSA -keysize 2048 -validity 10000 -storepass testgram123 -keypass testgram123 -dname "CN=Testgram,O=Testgram,C=US"
          echo -e "\nRELEASE_KEY_ALIAS=testgram\nRELEASE_STORE_PASSWORD=testgram123\nRELEASE_KEY_PASSWORD=testgram123" >> gradle.properties
      - name: Build APK
        run: ./gradlew --no-daemon --max-workers=2 -Dorg.gradle.jvmargs="-Xmx3g" :TMessagesProj_App:assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: testgram-apk
          path: TMessagesProj_App/build/outputs/apk/**/*.apk
